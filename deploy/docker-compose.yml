services:
  aicodex-admin:
    restart: always
    image: aicodex-admin:latest
    entrypoint: /bin/sh -c './server --createDatabase=true'
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: "true"
      driverName: postgres
      dbName: aicodex_admin
      dataSourceName: user=postgres password=123456 host=db port=5432 sslmode=disable dbname=aicodex_admin
    ports:
      - "8000:8000"
  db:
    restart: always
    image: postgres:18
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: aicodex_admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aicodex_admin"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
