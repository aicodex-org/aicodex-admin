# this is only an EXAMPLE of deploying aicodex-admin in Kubernetes
# please modify this file according to your requirements
apiVersion: v1
kind: Service
metadata:
  #EDIT IT: if you don't want to run aicodex-admin in default namespace, please modify this field
  #namespace: aicodex-admin
  name: aicodex-admin-svc
  labels:
    app: aicodex-admin
spec:
  #EDIT IT: if you don't want to run aicodex-admin in default namespace, please modify this filed
  type: NodePort
  ports:
    - port: 8000
  selector:
    app: aicodex-admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  #EDIT IT: if you don't want to run aicodex-admin in default namespace, please modify this field
  #namespace: aicodex-admin
  name: aicodex-admin-deployment
  labels:
    app: aicodex-admin
spec:
  #EDIT IT: if you don't use redis, aicodex-admin should not have multiple replicas
  replicas: 1
  selector:
    matchLabels:
      app: aicodex-admin
  template:
    metadata:
      labels:
        app: aicodex-admin
    spec:
      containers:
        - name: aicodex-admin-container
          image: aicodex-admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            # the mounted directory path in THE CONTAINER
            - mountPath: /conf
              name: conf
          env:       
            - name: RUNNING_IN_DOCKER
              value: "true"
      #if you want to deploy this in real prod env, consider the config map
      volumes:
        - name: conf
          hostPath:
            #EDIT IT: the mounted directory path in THE HOST
            path: /conf
