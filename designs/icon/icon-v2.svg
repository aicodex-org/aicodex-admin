<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0b22"/>
      <stop offset="100%" stop-color="#060412"/>
    </linearGradient>

    <!-- 身体主渐变：更亮更通透 -->
    <linearGradient id="body" x1="170" y1="100" x2="350" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ba6ff"/>
      <stop offset="35%" stop-color="#7b86f8"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- 身体左上高光 -->
    <radialGradient id="bodyHL" cx="210" cy="210" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bfc6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bfc6ff" stop-opacity="0"/>
    </radialGradient>

    <!-- 肚皮中心光 -->
    <radialGradient id="belly" cx="256" cy="310" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4d8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0"/>
    </radialGradient>

    <!-- 耳朵 -->
    <linearGradient id="earFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a0a8fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="earInner" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.25"/>
    </radialGradient>
    <!-- 耳朵高光 -->
    <radialGradient id="earHL" cx="45%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#d0d4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d0d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- 腮红 -->
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <!-- 虹膜 -->
    <radialGradient id="iris" cx="45%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#d4b5ff"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="75%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0f7a"/>
    </radialGradient>

    <!-- 眼睛反光环 -->
    <radialGradient id="eyeRim" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#1a1040" stop-opacity="0"/>
      <stop offset="95%" stop-color="#4c3a8f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4c3a8f" stop-opacity="0"/>
    </radialGradient>

    <!-- 光晕 -->
    <radialGradient id="aura" cx="256" cy="256" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- 底部环境光 -->
    <radialGradient id="floorGlow" cx="256" cy="420" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <filter id="gs"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#030210" flood-opacity="0.5"/></filter>
    <filter id="earShadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#030210" flood-opacity="0.3"/></filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#aura)"/>
  <ellipse cx="256" cy="420" rx="120" ry="40" fill="url(#floorGlow)"/>

  <!-- ===== 耳朵 ===== -->
  <!-- 左耳 -->
  <g filter="url(#earShadow)">
    <ellipse cx="190" cy="148" rx="42" ry="52" transform="rotate(-10 190 148)" fill="url(#earFill)"/>
  </g>
  <ellipse cx="190" cy="148" rx="28" ry="36" transform="rotate(-10 190 148)" fill="url(#earInner)"/>
  <ellipse cx="188" cy="142" rx="18" ry="22" transform="rotate(-10 188 142)" fill="url(#earHL)"/>

  <!-- 右耳 -->
  <g filter="url(#earShadow)">
    <ellipse cx="322" cy="148" rx="42" ry="52" transform="rotate(10 322 148)" fill="url(#earFill)"/>
  </g>
  <ellipse cx="322" cy="148" rx="28" ry="36" transform="rotate(10 322 148)" fill="url(#earInner)"/>
  <ellipse cx="324" cy="142" rx="18" ry="22" transform="rotate(10 324 142)" fill="url(#earHL)"/>

  <!-- ===== 身体 ===== -->
  <g filter="url(#shadow)">
    <path d="
      M 256 145
      C 210 158, 128 218, 118 300
      C 110 368, 142 418, 196 438
      C 222 448, 246 452, 256 452
      C 266 452, 290 448, 316 438
      C 370 418, 402 368, 394 300
      C 384 218, 302 158, 256 145
      Z
    " fill="url(#body)"/>
  </g>

  <!-- 身体高光 -->
  <path d="
    M 256 145
    C 210 158, 128 218, 118 300
    C 110 368, 142 418, 196 438
    C 222 448, 246 452, 256 452
    C 266 452, 290 448, 316 438
    C 370 418, 402 368, 394 300
    C 384 218, 302 158, 256 145
    Z
  " fill="url(#bodyHL)"/>

  <!-- 肚皮光 -->
  <ellipse cx="256" cy="320" rx="90" ry="85" fill="url(#belly)"/>

  <!-- 身体边缘微光（左侧） -->
  <path d="
    M 200 180
    C 165 210, 130 265, 122 310
    C 118 340, 125 370, 140 395
  " fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.08" stroke-linecap="round"/>

  <!-- ===== 眼睛 ===== -->
  <!-- 左眼 -->
  <ellipse cx="218" cy="280" rx="32" ry="34" fill="#0c0620"/>
  <ellipse cx="218" cy="280" rx="32" ry="34" fill="url(#eyeRim)"/>
  <circle cx="220" cy="278" r="22" fill="#150d30"/>
  <circle cx="222" cy="275" r="16" fill="url(#iris)"/>
  <circle cx="224" cy="273" r="9" fill="#0c0620"/>
  <!-- 主高光 -->
  <circle cx="232" cy="266" r="8" fill="white" opacity="0.97"/>
  <!-- 次高光 -->
  <circle cx="212" cy="285" r="4" fill="white" opacity="0.4"/>
  <!-- 底部反光 -->
  <ellipse cx="220" cy="296" rx="7" ry="2.5" fill="#7c3aed" opacity="0.12"/>

  <!-- 右眼 -->
  <ellipse cx="294" cy="280" rx="32" ry="34" fill="#0c0620"/>
  <ellipse cx="294" cy="280" rx="32" ry="34" fill="url(#eyeRim)"/>
  <circle cx="296" cy="278" r="22" fill="#150d30"/>
  <circle cx="298" cy="275" r="16" fill="url(#iris)"/>
  <circle cx="300" cy="273" r="9" fill="#0c0620"/>
  <circle cx="308" cy="266" r="8" fill="white" opacity="0.97"/>
  <circle cx="288" cy="285" r="4" fill="white" opacity="0.4"/>
  <ellipse cx="296" cy="296" rx="7" ry="2.5" fill="#7c3aed" opacity="0.12"/>

  <!-- ===== 鼻子 (小巧的倒三角) ===== -->
  <ellipse cx="256" cy="315" rx="5" ry="3.5" fill="#2e1f6f" opacity="0.6"/>

  <!-- ===== 嘴巴 ===== -->
  <path d="M 247 325 Q 252 333 256 333 Q 260 333 265 325" stroke="#2e1f6f" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ===== 腮红 ===== -->
  <ellipse cx="185" cy="300" rx="22" ry="14" fill="url(#blush)"/>
  <ellipse cx="327" cy="300" rx="22" ry="14" fill="url(#blush)"/>

  <!-- ===== 小手 ===== -->
  <ellipse cx="130" cy="345" rx="22" ry="16" transform="rotate(-15 130 345)" fill="#5550d0" opacity="0.7"/>
  <ellipse cx="382" cy="345" rx="22" ry="16" transform="rotate(15 382 345)" fill="#5550d0" opacity="0.7"/>

  <!-- ===== 小脚 ===== -->
  <ellipse cx="222" cy="448" rx="28" ry="14" fill="#4338ca" opacity="0.85"/>
  <ellipse cx="290" cy="448" rx="28" ry="14" fill="#4338ca" opacity="0.85"/>

  <!-- ===== 环境粒子 ===== -->
  <g filter="url(#gs)" opacity="0.25">
    <circle cx="88" cy="120" r="1.8" fill="#a5b4fc"/>
    <circle cx="425" cy="140" r="1.5" fill="#c4b5fd"/>
    <circle cx="72" cy="360" r="1.3" fill="#818cf8"/>
    <circle cx="440" cy="330" r="1.6" fill="#a78bfa"/>
    <circle cx="105" cy="440" r="1.2" fill="#ddd6fe"/>
    <circle cx="410" cy="445" r="1.3" fill="#c4b5fd"/>
    <circle cx="420" cy="85" r="1" fill="#e0e7ff"/>
    <circle cx="95" cy="220" r="1.2" fill="#a5b4fc"/>
  </g>

</svg>
